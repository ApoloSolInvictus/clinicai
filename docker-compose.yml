services:
  local-node:
    build:
      context: ./services/local-node
    container_name: lux-aeterna-local-node
    environment:
      PORT: 8787
      CLINIC_ID: ${CLINIC_ID:-clinic-san-jose}
      CLINIC_NAME: ${CLINIC_NAME:-Clinica San Jose}
      CENTRAL_API_URL: ${CENTRAL_API_URL:-http://host.docker.internal:3000/api}
      LOCAL_NODE_TOKEN: ${LOCAL_NODE_TOKEN:-dev-local-node-token}
      NODE_HEALTH_REQUIRES_TOKEN: ${NODE_HEALTH_REQUIRES_TOKEN:-true}
      OPENCLAW_MODE: ${OPENCLAW_MODE:-gateway}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_RUNNER_URL: ${OPENCLAW_RUNNER_URL:-http://host.docker.internal:18889/run}
      OPENCLAW_RUNNER_TIMEOUT_MS: ${OPENCLAW_RUNNER_TIMEOUT_MS:-8000}
      OPENCLINIC_CENTRAL_QUEUE_URL: ${OPENCLINIC_CENTRAL_QUEUE_URL:-https://www.7openclinic.com/api/node-queue}
      OPENCLINIC_CENTRAL_QUEUE_TOKEN: ${OPENCLINIC_CENTRAL_QUEUE_TOKEN:-dev-local-node-token}
      OPENCLINIC_QUEUE_POLL_MS: ${OPENCLINIC_QUEUE_POLL_MS:-15000}
      OPENCLINIC_QUEUE_PULL_LIMIT: ${OPENCLINIC_QUEUE_PULL_LIMIT:-3}
      OPENCLINIC_DEMO_EMAIL: ${OPENCLINIC_DEMO_EMAIL:-ronnywoods77@gmail.com}
      OPENCLINIC_DEMO_WHATSAPP: ${OPENCLINIC_DEMO_WHATSAPP:-+506-6121-5702}
      OPENCLINIC_MESSAGE_PROVIDER: ${OPENCLINIC_MESSAGE_PROVIDER:-demo-only}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8787:8787"
    volumes:
      - local-node-data:/app/local-data
    restart: unless-stopped

volumes:
  local-node-data:
